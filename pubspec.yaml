name: calculator
description: "calculator app created with flutter"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '3.5.4'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  provider: ^6.1.2
  math_expressions: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
     - images/

fonts:
   - family: Pretendard
     fonts:
       - asset: assets/fonts/Pretendard-Regular.ttf
       - asset: assets/fonts/Pretendard-SemiBold.ttf
         weight: 600
         